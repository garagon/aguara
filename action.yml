name: 'Aguara Security Scanner'
description: 'Scan AI agent skills and MCP servers for security threats — prompt injection, data exfiltration, tool shadowing, and more.'
author: 'garagon'

branding:
  icon: 'shield'
  color: 'orange'

inputs:
  path:
    description: 'Path to scan'
    required: false
    default: './'
  severity:
    description: 'Minimum severity to report: critical, high, medium, low, info'
    required: false
    default: 'info'
  fail-on:
    description: 'Exit code 1 if findings at or above this severity (critical, high, medium, low)'
    required: false
    default: ''
  format:
    description: 'Output format: terminal, json, sarif, markdown'
    required: false
    default: 'sarif'
  output:
    description: 'Output file path'
    required: false
    default: 'aguara-results.sarif'
  verbose:
    description: 'Show rule descriptions and confidence scores'
    required: false
    default: 'false'
  rules:
    description: 'Additional rules directory'
    required: false
    default: ''
  disable-rule:
    description: 'Rule IDs to disable (comma-separated)'
    required: false
    default: ''
  max-file-size:
    description: 'Maximum file size to scan (e.g. 50MB, 100MB)'
    required: false
    default: ''
  version:
    description: 'Aguara version to install (empty = latest)'
    required: false
    default: ''
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning'
    required: false
    default: 'true'

outputs:
  findings-count:
    description: 'Number of findings detected'
    value: ${{ steps.scan.outputs.findings-count }}
  exit-code:
    description: 'Exit code from aguara scan'
    value: ${{ steps.scan.outputs.exit-code }}

runs:
  using: 'composite'
  steps:
    - name: Install Aguara
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        INSTALL_DIR: ${{ runner.temp }}/aguara-bin
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        curl -fsSL --max-time 30 https://raw.githubusercontent.com/garagon/aguara/main/install.sh | bash
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"

    - name: Run Aguara scan
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_SEVERITY: ${{ inputs.severity }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_RULES: ${{ inputs.rules }}
        INPUT_DISABLE_RULE: ${{ inputs.disable-rule }}
        INPUT_MAX_FILE_SIZE: ${{ inputs.max-file-size }}
      run: |
        args=("scan" "$INPUT_PATH")
        args+=("--severity" "$INPUT_SEVERITY")
        args+=("--format" "$INPUT_FORMAT")
        args+=("--no-color")
        args+=("--no-update-check")

        if [ -n "$INPUT_FAIL_ON" ]; then
          args+=("--fail-on" "$INPUT_FAIL_ON")
        fi

        if [ -n "$INPUT_OUTPUT" ]; then
          args+=("-o" "$INPUT_OUTPUT")
        fi

        if [ "$INPUT_VERBOSE" = "true" ]; then
          args+=("-v")
        fi

        if [ -n "$INPUT_RULES" ]; then
          args+=("--rules" "$INPUT_RULES")
        fi

        if [ -n "$INPUT_DISABLE_RULE" ]; then
          args+=("--disable-rule" "$INPUT_DISABLE_RULE")
        fi

        if [ -n "$INPUT_MAX_FILE_SIZE" ]; then
          args+=("--max-file-size" "$INPUT_MAX_FILE_SIZE")
        fi

        set +e
        aguara "${args[@]}"
        scan_exit=$?
        set -e

        # Extract findings count from output file
        count=0
        if [ -f "$INPUT_OUTPUT" ]; then
          if [ "$INPUT_FORMAT" = "sarif" ]; then
            count=$(jq '[.runs[].results | length] | add // 0' "$INPUT_OUTPUT" 2>/dev/null || echo 0)
          elif [ "$INPUT_FORMAT" = "json" ]; then
            count=$(jq '.findings | length // 0' "$INPUT_OUTPUT" 2>/dev/null || echo 0)
          fi
        fi

        echo "findings-count=${count}" >> "$GITHUB_OUTPUT"
        echo "exit-code=${scan_exit}" >> "$GITHUB_OUTPUT"

        exit "$scan_exit"

    - name: Upload SARIF to GitHub Code Scanning
      if: always() && inputs.format == 'sarif' && inputs['upload-sarif'] == 'true'
      uses: github/codeql-action/upload-sarif@v3
      continue-on-error: true
      with:
        sarif_file: ${{ inputs.output }}
        wait-for-processing: false

    - name: Propagate scan exit code
      if: always()
      shell: bash
      env:
        SCAN_EXIT: ${{ steps.scan.outputs.exit-code }}
      run: exit "${SCAN_EXIT:-0}"
