name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: make build

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.9.0"

      - name: Test
        run: make test

      - name: Vet
        run: make vet
