name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update v1 action tag
        if: success() && startsWith(github.ref_name, 'v1')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa v1 -m "v1 action alias → ${{ github.ref_name }}"
          git push origin v1 --force

      - name: Trigger observatory rescan
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.OBSERVATORY_DISPATCH_TOKEN }}
        run: |
          gh api repos/garagon/aguara-observatory/dispatches \
            -f event_type=aguara-release \
            -f "client_payload[tag]=${{ github.ref_name }}"
