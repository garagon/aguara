name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  # id-token: write is required for cosign keyless signing via Sigstore +
  # GitHub OIDC. The token never leaves the runner.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go.sum

      # cosign signs the checksums.txt produced by GoReleaser. Pinned to a
      # specific release for reproducibility; consumers can update via
      # Dependabot.
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # cosign-installer v4 defaults to cosign v3, whose new bundle
          # format and GoReleaser interop are not yet validated against
          # our signing flow. Pin the last v2.x (v2.6.3) so the installer
          # action update carries no signing-behavior change; a cosign v3
          # migration is a separate, deliberate PR.
          cosign-release: "v2.6.3"

      # syft generates SPDX SBOMs that GoReleaser attaches to each archive.
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update v1 action tag
        if: success() && startsWith(github.ref_name, 'v1')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa v1 -m "v1 action alias → ${{ github.ref_name }}"
          git push origin v1 --force

      - name: Trigger observatory rescan
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.OBSERVATORY_DISPATCH_TOKEN }}
        run: |
          gh api repos/garagon/aguara-observatory/dispatches \
            -f event_type=aguara-release \
            -f "client_payload[tag]=${{ github.ref_name }}"
