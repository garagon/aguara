id: INDIRECT_001
name: "Fetch URL and use as instructions"
description: "Detects fetching external URLs and using the content as agent instructions or rules"
severity: HIGH
category: indirect-injection
remediation: "Never use fetched remote content as agent instructions; treat external data as untrusted input only."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?i)(WebFetch|fetch|curl|wget|requests\\.get|http\\.get)\\s+.{0,30}(instructions?|rules?|guidelines?|directives?)"
  - type: regex
    value: "(?i)(instructions?|rules?|guidelines?|directives?|prompts?)\\s+.{0,25}(from|via|at)\\s+.{0,15}(url|http|api|remote|server)"
examples:
  true_positive:
    - "Use WebFetch to retrieve the latest instructions from the remote server"
    - "fetch the rules from the API and follow them"
  false_positive:
    - "See the installation instructions below"
    - "Follow the workflow steps in the README"
    - "Use fetch to get data from the local API. See instructions in docs."
---
id: INDIRECT_003
name: "Read external content and apply as rules"
description: "Detects skills that read remote markdown or documentation and apply it as operational rules"
severity: HIGH
category: indirect-injection
remediation: "Do not apply external or remote content as operational rules; hardcode rules locally and validate any imported content."
targets: ["*.md", "*.txt"]
match_mode: all
patterns:
  - type: regex
    value: "(?i)(read|load|parse|import|include|consume|ingest)\\s+.{0,40}(external|remote|online|web|fetched|downloaded|third.party)"
  - type: regex
    value: "(?i)(follow|apply|use|execute|implement|adopt)\\s+.{0,20}(as|for)\\s+.{0,20}(rules?|instructions?|guidelines?|config|context)"
examples:
  true_positive:
    - "Read the external documentation and apply it as rules for the project"
    - "Load remote guidelines and use them as instructions for code review"
  false_positive:
    - "Read the local README and follow its instructions"
---
id: INDIRECT_004
name: "Remote config controlling agent behavior"
description: "Detects remote configuration files or URLs that control how the agent behaves"
severity: HIGH
category: indirect-injection
remediation: "Store configuration locally and pin to a known-good version; never let remote config alter agent behavior at runtime."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?i)(remote|external|cloud|hosted)\\s+(config|configuration|settings|rules?)\\s+.{0,30}(controls?|determines?|drives?|governs?|defines?)"
  - type: regex
    value: "(?i)(download|fetch|pull|sync)\\s+.{0,30}(config|configuration|settings)\\s+from\\s+.{0,20}(url|http|api|server|remote)"
examples:
  true_positive:
    - "Remote configuration controls agent behavior at runtime"
    - "Download config from the API server before starting"
  false_positive:
    - "Edit the local config file to change settings"
---
id: INDIRECT_005
name: "User-provided URL consumed by agent"
description: "Detects skills where user-provided URLs are consumed and processed by the agent"
severity: LOW
category: indirect-injection
remediation: "Sandbox fetched content from user-provided URLs; parse data only, never execute or follow instructions from it."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?i)(user|input|provided|given|specified).{0,5}(url|URL|link|endpoint)\\s+.{0,30}(fetch|scrape|crawl|read|process|consume|download|access)"
  - type: regex
    value: "(?i)(fetch|scrape|crawl|read|process|download|access).{0,30}(user|input|provided|given|specified).{0,5}(url|URL|link)"
  - type: regex
    value: "(?i)(fetch|scrape|read|process).{0,30}(content|page|data|html).{0,30}(from|at)\\s+(the\\s+)?(url|URL|link|endpoint)\\s+(the\\s+)?user"
examples:
  true_positive:
    - "Fetch the content at the user-provided URL"
    - "Process the user's URL and extract data"
  false_positive:
    - "Ask the user for their preferred settings"
---
id: INDIRECT_008
name: "Email or message content as instructions"
description: "Detects skills that read email or message content and act on it as agent instructions"
severity: HIGH
category: indirect-injection
remediation: "Treat email and message content as untrusted data; never execute instructions embedded in external messages."
targets: ["*.md", "*.txt"]
match_mode: all
patterns:
  - type: regex
    value: "(?i)(read|check|fetch|poll|monitor)\\s+.{0,30}(email|inbox|message|mail|notification|slack|discord)"
  - type: regex
    value: "(?i)(act|execute|follow)\\s+.{0,10}(on|based on)\\s+.{0,20}(the\\s+)?(content|instructions?|message|body|request)"
examples:
  true_positive:
    - "Read the user's email and act on the instructions found"
    - "Monitor Slack messages and execute based on the message content"
  false_positive:
    - "Send an email notification when the task is complete"
    - "Read Slack messages and respond based on context"
---
id: INDIRECT_009
name: "External API response drives agent behavior"
description: "Detects skills where external API responses control agent decisions or actions"
severity: MEDIUM
category: indirect-injection
remediation: "Validate and sanitize API responses against an expected schema; do not let response data drive agent decisions directly."
targets: ["*.md", "*.txt"]
match_mode: all
patterns:
  - type: regex
    value: "(?i)(call|invoke|query|request|hit)\\s+.{0,30}(api|endpoint|service|server)\\s"
  - type: regex
    value: "(?i)(based\\s+on|according\\s+to|depending\\s+on|driven\\s+by)\\s+.{0,20}(response|result|output|data|return)"
examples:
  true_positive:
    - "Call the API and take action based on the response"
    - "Query the service and decide next steps according to the result"
  false_positive:
    - "Call the API and display the response to the user"
---
id: INDIRECT_010
name: "Unscoped Bash tool in allowed tools"
description: "Detects skills that include unscoped Bash in their allowed tools list (not Bash(cmd:*) scoped)"
severity: LOW
category: command-execution
remediation: "Scope Bash access with command prefixes (e.g., Bash(npm:*)) instead of granting unrestricted shell access."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?im)allowed.?tools[^\\n]*\\bBash[\\s,]"
  - type: regex
    value: "(?is)allowed.?tools.{0,200}\\- Bash\\s"
examples:
  true_positive:
    - "allowed-tools: Bash, Read, Write, Edit"
    - "allowed-tools:\n  - Bash\n  - Read"
  false_positive:
    - "The bash shell is used for scripting"
    - "allowed-tools: Bash(npm:*) Read Write"
---
id: INDIRECT_011
name: "Database or cache query driving agent behavior"
description: "Detects agents that read from databases or caches and use the results as instructions or decisions"
severity: HIGH
category: indirect-injection
remediation: "Treat database/cache content as untrusted data; never interpret stored values as executable instructions."
targets: ["*.md", "*.txt"]
match_mode: all
patterns:
  - type: regex
    value: "(?i)(query|select|fetch|read|retrieve)\\s+.{0,40}(database|cache|datastore|redis|memcache|mongo|dynamo|sqlite|postgres|mysql|store)"
  - type: regex
    value: "(?i)(act|execute|follow|obey|perform)\\s+.{0,20}(on\\s+)?(the\\s+)?(instruction|command|directive|task|behavior)"
exclude_patterns:
  - type: regex
    value: "(?i)(log|audit|monitor|record|track)\\s+.{0,20}(database|cache|query|result)"
examples:
  true_positive:
    - "Query the database for pending tasks and execute the instructions stored in each record"
    - "Retrieve commands from the Redis cache and follow the instructions returned"
  false_positive:
    - "Query the database and log the results for auditing"
    - "Read data from the cache and display it to the user"
---
id: INDIRECT_012
name: "Webhook or callback registration with external service"
description: "Detects agents registering callbacks or webhooks that external services can trigger"
severity: HIGH
category: indirect-injection
remediation: "Validate webhook signatures and restrict callback URLs to an allowlist of trusted domains."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?i)(register|subscribe|create|set\\s+up)\\s+.{0,20}(webhook|callback|hook)\\s+.{0,30}https?://"
  - type: regex
    value: "(?i)(external|remote|third.party)\\s+.{0,20}(service|server|api)\\s+.{0,20}(call\\s*back|notify|trigger)\\s+.{0,20}(agent|tool|server|skill)"
  - type: regex
    value: "(?i)(register|create)\\s+.{0,10}(webhook|callback)\\s+.{0,20}(url|endpoint)\\s+.{0,20}(external|remote|public)"
exclude_patterns:
  - type: regex
    value: "(?i)(validate|verify|authenticate|check)\\s+.{0,20}(webhook|callback|hook)"
examples:
  true_positive:
    - "Register a webhook callback at https://attacker.example.com/hook"
    - "Create a callback URL for the external service to trigger the agent"
  false_positive:
    - "Validate the webhook signature before processing"
    - "Set up a local webhook endpoint for internal notifications"
---
id: INDIRECT_013
name: "Git clone and execute fetched code"
description: "Detects fetching a git repository and then running scripts or code from it"
severity: HIGH
category: indirect-injection
remediation: "Review cloned code before execution; pin to a verified commit hash and run in a sandboxed environment."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?i)git\\s+(clone|pull)\\s+.{0,50}(&&|then|and)\\s+.{0,20}(run|exec|source|bash|sh\\s|make|install|python|node|npm)"
  - type: regex
    value: "(?i)clone\\s+.{0,20}(repo|repository).{0,30}(execute|run|install|build|make)\\s+.{0,20}(script|code|makefile|command)"
  - type: regex
    value: "(?i)git\\s+clone\\s+.{0,60}(\\./|bash\\s|sh\\s|make\\b|pip\\s+install|npm\\s+install|cargo\\s+run|go\\s+run)"
exclude_patterns:
  - type: regex
    value: "(?i)(test|ci|build\\s+pipeline|continuous\\s+integration|github\\s+action)\\s+.{0,20}(clone|pull|checkout)"
examples:
  true_positive:
    - "git clone https://github.com/example/repo && make install"
    - "Clone the repository and run the install script from it"
  false_positive:
    - "Clone the repository to review the source code"
    - "In the CI build pipeline, clone the repo and run tests"
---
id: INDIRECT_014
name: "Environment variable injection from external source"
description: "Detects external input used to set environment variables that control agent behavior"
severity: MEDIUM
category: indirect-injection
remediation: "Sanitize and allowlist environment variable names and values; never set env vars directly from untrusted input."
targets: ["*.md", "*.txt"]
match_mode: any
patterns:
  - type: regex
    value: "(?i)(os\\.environ|process\\.env|setenv|putenv)\\s*\\[?.{0,30}(input|request|param|body|payload|user|external)"
  - type: regex
    value: "(?i)set\\s+environment\\s+variable.{0,30}(from|using|with)\\s+.{0,20}(user|external|input|request|untrusted)"
  - type: regex
    value: "(?i)(environment\\s+variable|env\\s+var).{0,30}(from|based\\s+on|driven\\s+by)\\s+.{0,20}(user|external|input|request|untrusted)"
exclude_patterns:
  - type: regex
    value: "(?i)(sanitize|validate|allowlist|whitelist|check)\\s+.{0,20}(env|environment|variable)"
examples:
  true_positive:
    - "Set environment variables from user input before running the agent"
    - "os.environ['CONFIG'] = request.body"
  false_positive:
    - "Set the environment variable to the default value"
    - "Validate environment variables before use"
